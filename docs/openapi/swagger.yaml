openapi: 3.0.0
info:
  title: Social Networking Platform API
  version: 1.1.0
  description: |
    API Gateway contract for the Social Networking Platform.
    Authentication is handled through Google OAuth2, JWTs, and Redis-backed sessions.

servers:
  - url: http://localhost:8080

tags:
  - name: Auth
  - name: Users
  - name: Posts
  - name: Feed
  - name: Notifications

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string
        request_id:
          type: string

    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
        request_id:
          type: string

    AuthUser:
      type: object
      properties:
        id:
          type: string
          example: google:1234567890
        provider:
          type: string
          example: google
        provider_subject:
          type: string
          example: 1234567890
        email:
          type: string
          format: email
        name:
          type: string
        profile_picture:
          type: string
          format: uri

    AuthCallbackResponse:
      type: object
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        session_id:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'

    SessionValidationResponse:
      type: object
      properties:
        session_id:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/AuthUser'

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        bio:
          type: string
        profile_picture:
          type: string
        profilePicture:
          type: string
          description: Deprecated alias; responses use snake_case JSON (profile_picture).

    UpdateProfileRequest:
      type: object
      description: Partial profile update; omit fields you do not want to change.
      properties:
        name:
          type: string
        bio:
          type: string
        profile_picture:
          type: string

    Post:
      type: object
      properties:
        id:
          type: string
        authorId:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        message:
          type: string
        read:
          type: boolean

paths:
  /health:
    get:
      tags: [Auth]
      summary: Service health check
      responses:
        '200':
          description: Service is healthy

  /api/v1/auth/login:
    get:
      tags: [Auth]
      summary: Start Google OAuth2 login
      description: Redirects the user to Google consent.
      responses:
        '302':
          description: Redirect to Google OAuth2 consent screen
        '500':
          description: OAuth provider is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/callback:
    get:
      tags: [Auth]
      summary: Handle Google OAuth2 callback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Google login completed and JWT issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthCallbackResponse'
        '400':
          description: Missing code or invalid OAuth state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: Google token or userinfo exchange failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate the active session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session invalidated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/session:
    get:
      tags: [Auth]
      summary: Validate the current session-backed JWT
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session is valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SessionValidationResponse'
        '401':
          description: Session is missing, expired, or revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get the authenticated user's profile
      description: The API gateway forwards `X-User-ID` derived from the session/JWT; clients should not send raw user identifiers in the path for this endpoint.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          description: Missing or invalid authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [Users]
      summary: Update the authenticated user's profile (partial)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '400':
          description: Validation error or invalid JSON body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing or invalid authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Get user profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/users/{id}/follow:
    post:
      tags: [Users]
      summary: Follow a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Follow accepted (idempotent; no response body)
        '400':
          description: Bad request (e.g. invalid user id)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden (e.g. cannot follow self)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Users]
      summary: Unfollow a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Unfollow accepted (no response body)
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Missing authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden (e.g. cannot unfollow self)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/posts:
    post:
      tags: [Posts]
      summary: Create a post
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Post created

  /api/v1/posts/{id}:
    get:
      tags: [Posts]
      summary: Get a single post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
    patch:
      tags: [Posts]
      summary: Update a post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post updated
    delete:
      tags: [Posts]
      summary: Delete a post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post deleted

  /api/v1/feed:
    get:
      tags: [Feed]
      summary: Get personalized feed
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User feed retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'

  /api/v1/notifications:
    get:
      tags: [Notifications]
      summary: Get user notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
