name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.24"
  GOCACHE: ${{ github.workspace }}/.gocache
  GOTELEMETRY: "off"

jobs:
  unit-tests:
    name: Unit Tests and Coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - users-service
          - posts-service
          - feed-service
          - notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.service }}/go.sum
      - name: Download modules
        working-directory: ${{ matrix.service }}
        run: go mod download
      - name: Run tests with coverage
        working-directory: ${{ matrix.service }}
        run: |
          go test -v -race -covermode=atomic -coverprofile=coverage.out $(go list ./... | grep -v '/integration$') 2>&1 | tee test-output.txt
          go tool cover -func=coverage.out | tee coverage-summary.txt
      - name: Enforce service package coverage
        working-directory: ${{ matrix.service }}
        run: |
          python3 - <<'PY'
          import subprocess, sys
          result = subprocess.run(["go", "tool", "cover", "-func=coverage.out"], capture_output=True, text=True, check=True)
          found = False
          failures = []
          for line in result.stdout.splitlines():
              if "/internal/service" not in line or "(statements)" not in line:
                  continue
              found = True
              pct = float(line.split()[-1].rstrip("%"))
              print(f"service package coverage: {pct:.1f}%")
              if pct < 80:
                  failures.append(f"{pct:.1f}%")
          if failures:
              print("FAIL: service package below 80% coverage: " + ", ".join(failures))
              sys.exit(1)
          if not found:
              print("INFO: no internal/service package found; coverage gate skipped")
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/coverage.out
            ${{ matrix.service }}/coverage-summary.txt
            ${{ matrix.service }}/test-output.txt
          retention-days: 14

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      users-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: users_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run posts in-memory integration tests
        working-directory: posts-service
        run: go test -v -race ./internal/integration/...
      - name: Run users Postgres integration tests
        working-directory: users-service
        env:
          INTEGRATION_PG_DSN: "postgres://postgres:postgres@localhost:5433/users_db?sslmode=disable"
        run: go test -v -race -tags integration ./internal/integration/...

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate OpenAPI and event contracts
        shell: pwsh
        run: ./tests/contract/contract-validation.ps1

  load-test-validation:
    name: Load Script Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect k6 scripts
        run: |
          for script in tests/load/k6/gateway-read-load.js tests/load/k6/social-write-stress.js; do
            docker run --rm -v "$PWD:/workspace" -w /workspace grafana/k6:0.53.0 inspect "$script"
          done
      - name: Validate runner wiring
        shell: pwsh
        run: ./tests/load/run-load-tests.ps1 -ValidateOnly

  build-and-artifacts:
    name: Build and Artifact Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build and vet services
        run: |
          for svc in api-gateway auth-service users-service posts-service feed-service notification-service; do
            (cd "$svc" && go build ./cmd/server/... && go vet ./...)
          done
      - name: Validate Docker Compose
        run: docker compose -f deploy/compose/compose.yml config --quiet

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - integration-tests
      - contract-tests
      - load-test-validation
      - build-and-artifacts
    if: always()
    steps:
      - name: Check required jobs
        run: |
          python3 - <<'PY'
          import json, os, sys
          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = [name for name, data in needs.items() if data["result"] != "success"]
          if failed:
              print("FAIL: " + ", ".join(failed))
              sys.exit(1)
          print("PASS: all CI jobs passed")
          PY
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
