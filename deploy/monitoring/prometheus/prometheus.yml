global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:8081"]

  - job_name: users-service
    metrics_path: /metrics
    static_configs:
      - targets: ["users-service:8082"]

  - job_name: posts-service
    metrics_path: /metrics
    static_configs:
      - targets: ["posts-service:8083"]

  - job_name: feed-service
    metrics_path: /metrics
    static_configs:
      - targets: ["feed-service:8084"]

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ["notification-service:8085"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: postgres
    static_configs:
      - targets:
          - users-db-exporter:9187
          - posts-db-exporter:9187
          - notifications-db-exporter:9187
