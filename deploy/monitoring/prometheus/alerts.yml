groups:
  - name: social-networking-platform-critical
    rules:
      - alert: ServiceDown
        expr: up{job=~"api-gateway|auth-service|users-service|posts-service|feed-service|notification-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Prometheus cannot scrape {{ $labels.job }} for more than 1 minute."

      - alert: HighHTTPErrorRate
        expr: |
          sum by (service) (rate(http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum by (service) (rate(http_requests_total[5m])), 1)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} has a high 5xx error rate"
          description: "More than 5 percent of HTTP requests are returning 5xx responses."

      - alert: HighHTTPLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (service, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} p95 latency is high"
          description: "p95 HTTP latency has been above 1 second for more than 5 minutes."

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis is unavailable to Prometheus."

      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL exporter is down"
          description: "One PostgreSQL exporter cannot be scraped."

      - alert: KafkaExporterDown
        expr: up{job="kafka"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kafka exporter is down"
          description: "Kafka broker visibility is unavailable to Prometheus."

      - alert: KafkaConsumerLag
        expr: kafka_consumergroup_lag > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.consumergroup }} has lag above 100 messages."

      - alert: HostHighMemoryUsage
        expr: |
          1 - (
            node_memory_MemAvailable_bytes
            /
            node_memory_MemTotal_bytes
          ) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage is high"
          description: "Host memory usage is above 90 percent."
