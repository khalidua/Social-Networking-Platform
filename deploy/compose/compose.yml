version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: snp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - snp-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: snp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - snp-net

  redis:
    image: redis:7-alpine
    container_name: snp-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - snp-net

  users-db:
    image: postgres:16-alpine
    container_name: snp-users-db
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snp-net

  posts-db:
    image: postgres:16-alpine
    container_name: snp-posts-db
    environment:
      POSTGRES_DB: posts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - posts-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d posts_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snp-net

  notifications-db:
    image: postgres:16-alpine
    container_name: snp-notifications-db
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - notifications-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifications_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snp-net

  auth-service:
    build:
      context: ../../auth-service
      dockerfile: Dockerfile
    container_name: snp-auth-service
    depends_on:
      - redis
    environment:
      SERVICE_NAME: auth-service
      APP_ENV: development
      PORT: 8081
      LOG_LEVEL: info
      HTTP_READ_TIMEOUT: 10
      HTTP_WRITE_TIMEOUT: 10
      HTTP_IDLE_TIMEOUT: 60
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dummy-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dummy-google-client-secret}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:8081/api/v1/auth/callback}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_IN: 24h
      SESSION_TTL: 24h
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8081:8081"
    networks:
      - snp-net

  users-service:
    build:
      context: ../../users-service
      dockerfile: Dockerfile
    container_name: snp-users-service
    depends_on:
      users-db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SERVICE_NAME: users-service
      APP_ENV: development
      PORT: 8082
      LOG_LEVEL: info
      HTTP_READ_TIMEOUT: 10
      HTTP_WRITE_TIMEOUT: 10
      HTTP_IDLE_TIMEOUT: 60
      DB_HOST: users-db
      DB_PORT: 5432
      DB_NAME: users_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_USER_FOLLOWED: user.followed
    ports:
      - "8082:8082"
    networks:
      - snp-net

  posts-service:
    build:
      context: ../../posts-service
      dockerfile: Dockerfile
    container_name: snp-posts-service
    depends_on:
      posts-db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SERVICE_NAME: posts-service
      APP_ENV: development
      PORT: 8083
      LOG_LEVEL: info
      HTTP_READ_TIMEOUT: 10
      HTTP_WRITE_TIMEOUT: 10
      HTTP_IDLE_TIMEOUT: 60
      DB_HOST: posts-db
      DB_PORT: 5432
      DB_NAME: posts_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_POST_CREATED: post.created
      KAFKA_TOPIC_POST_INTERACTED: post.interacted
    ports:
      - "8083:8083"
    networks:
      - snp-net

  feed-service:
    build:
      context: ../../feed-service
      dockerfile: Dockerfile
    container_name: snp-feed-service
    depends_on:
      - redis
      - kafka
      - users-service
    environment:
      SERVICE_NAME: feed-service
      APP_ENV: development
      PORT: 8084
      LOG_LEVEL: info
      HTTP_READ_TIMEOUT: 10
      HTTP_WRITE_TIMEOUT: 10
      HTTP_IDLE_TIMEOUT: 60
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_POST_CREATED: post.created
      KAFKA_TOPIC_USER_FOLLOWED: user.followed
      USERS_SERVICE_URL: http://users-service:8082
    ports:
      - "8084:8084"
    networks:
      - snp-net

  notification-service:
    build:
      context: ../../notification-service
      dockerfile: Dockerfile
    container_name: snp-notification-service
    depends_on:
      notifications-db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SERVICE_NAME: notification-service
      APP_ENV: development
      PORT: 8085
      LOG_LEVEL: info
      HTTP_READ_TIMEOUT: 10
      HTTP_WRITE_TIMEOUT: 10
      HTTP_IDLE_TIMEOUT: 60
      DB_HOST: notifications-db
      DB_PORT: 5432
      DB_NAME: notifications_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_USER_FOLLOWED: user.followed
      KAFKA_TOPIC_POST_INTERACTED: post.interacted
    ports:
      - "8085:8085"
    networks:
      - snp-net

  api-gateway:
    build:
      context: ../../api-gateway
      dockerfile: Dockerfile
    container_name: snp-api-gateway
    depends_on:
      - auth-service
      - users-service
      - posts-service
      - feed-service
      - notification-service
      - redis
    environment:
      SERVICE_NAME: api-gateway
      APP_ENV: development
      PORT: 8080
      LOG_LEVEL: info
      HTTP_READ_TIMEOUT: 10
      HTTP_WRITE_TIMEOUT: 10
      HTTP_IDLE_TIMEOUT: 60
      AUTH_SERVICE_URL: http://auth-service:8081
      USERS_SERVICE_URL: http://users-service:8082
      POSTS_SERVICE_URL: http://posts-service:8083
      FEED_SERVICE_URL: http://feed-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me}
      UPSTREAM_TIMEOUT: 10s
      UPSTREAM_RETRY_ATTEMPTS: 3
      UPSTREAM_RETRY_BACKOFF: 100ms
      CIRCUIT_BREAKER_FAILURES: 5
      CIRCUIT_BREAKER_OPEN_FOR: 30s
      RATE_LIMIT_PER_MINUTE: 100
      RATE_LIMIT_WINDOW: 1m
    ports:
      - "8080:8080"
    networks:
      - snp-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: snp-prometheus
    depends_on:
      - api-gateway
      - auth-service
      - users-service
      - posts-service
      - feed-service
      - notification-service
      - redis-exporter
      - kafka-exporter
      - users-db-exporter
      - posts-db-exporter
      - notifications-db-exporter
      - node-exporter
      - cadvisor
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - snp-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: snp-grafana
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - snp-net

  loki:
    image: grafana/loki:3.1.1
    container_name: snp-loki
    command:
      - "-config.file=/etc/loki/loki.yml"
    volumes:
      - ../logging/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - snp-net

  promtail:
    image: grafana/promtail:3.1.1
    container_name: snp-promtail
    depends_on:
      - loki
    command:
      - "-config.file=/etc/promtail/promtail.yml"
    volumes:
      - ../logging/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9080:9080"
    networks:
      - snp-net

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: snp-redis-exporter
    depends_on:
      - redis
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - snp-net

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: snp-kafka-exporter
    depends_on:
      - kafka
    command:
      - "--kafka.server=kafka:29092"
    ports:
      - "9308:9308"
    networks:
      - snp-net

  users-db-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: snp-users-db-exporter
    depends_on:
      users-db:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@users-db:5432/users_db?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - snp-net

  posts-db-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: snp-posts-db-exporter
    depends_on:
      posts-db:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@posts-db:5432/posts_db?sslmode=disable
    ports:
      - "9188:9187"
    networks:
      - snp-net

  notifications-db-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: snp-notifications-db-exporter
    depends_on:
      notifications-db:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@notifications-db:5432/notifications_db?sslmode=disable
    ports:
      - "9189:9187"
    networks:
      - snp-net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: snp-node-exporter
    ports:
      - "9100:9100"
    networks:
      - snp-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: snp-cadvisor
    privileged: true
    ports:
      - "8086:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - snp-net

networks:
  snp-net:

volumes:
  users-db-data:
  posts-db-data:
  notifications-db-data:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
